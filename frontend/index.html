<!DOCTYPE html>
<html>
<head>
    <title>User App</title>

    <!-- Responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #f8f9fa, #e9ecef);
        }
    </style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark">
  <div class="container-fluid">
    <span class="navbar-brand">User Management App</span>
  </div>
</nav>

<div class="container mt-5">

    <!-- Card -->
    <div class="card shadow p-4">

        <h3 class="text-center mb-4">Register User</h3>

        <!-- Form -->
        <div class="mb-3">
            <label class="form-label">Name</label>
            <input id="name" class="form-control" placeholder="Enter name">
        </div>

        <div class="mb-3">
            <label class="form-label">Email</label>
            <input id="email" class="form-control" placeholder="Enter email">
        </div>

        <button class="btn btn-primary w-100" onclick="register()">Register</button>

        <!-- Success Message -->
        <div id="successMsg" class="alert alert-success mt-3 d-none">
            User registered successfully!
        </div>

    </div>

    <!-- Users List -->
    <div class="card shadow p-4 mt-4">
        <h4 class="mb-3">Users List</h4>

        <!-- Loader -->
        <div id="loader" class="text-center d-none mb-3">
            <div class="spinner-border text-primary"></div>
        </div>

        <div id="users" class="list-group"></div>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
