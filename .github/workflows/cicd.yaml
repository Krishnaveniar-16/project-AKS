name: CI-CD Pipeline for AKS Deployment

on:
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}


    - name: Login to ACR
      run: az acr login --name appacr1603


    - name: Build Backend Image
      run: |
        docker build -t appacr1603.azurecr.io/backend:latest ./backend

    - name: Push Backend Image
      run: |
        docker push appacr1603.azurecr.io/backend:latest


    - name: Build Frontend Image
      run: |
        docker build -t appacr1603.azurecr.io/frontend:latest ./frontend

    - name: Push Frontend Image
      run: |
        docker push appacr1603.azurecr.io/frontend:latest


    - name: Get AKS Credentials
      run: |
        az aks get-credentials \
          --resource-group appRG1603 \
          --name appAKS1603 \
          --overwrite-existing


    - name: Deploy to AKS
      run: |
        kubectl apply -f k8s/