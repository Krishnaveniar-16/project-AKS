name: CI-CD Pipeline for AKS Deployment

on:
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Login to ACR
      run: az acr login --name appacr1603

    - name: Build Backend Image
      run: |
        docker build -t appacr1603.azurecr.io/backend:${{ github.sha }} ./backend
    - name: Run Trivy Scan (Backend)   #TRIVY SCAN (BACKEND)
      uses: aquasecurity/trivy-action@0.20.0
      with:
        image-ref: appacr1603.azurecr.io/backend:${{ github.sha }}
        format: json
        output: backend-trivy-report.json
        exit-code: 0
    - name: Upload Backend Scan Report
      uses: actions/upload-artifact@v4
      with:
        name: backend-trivy-report
        path: backend-trivy-report.json

    - name: Push Backend Image
      run: |
        docker push appacr1603.azurecr.io/backend:${{ github.sha }}

    - name: Build Frontend Image
      run: |
        docker build -t appacr1603.azurecr.io/frontend:${{ github.sha }} ./frontend
    - name: Run Trivy Scan (Frontend)  #TRIVY SCAN (FRONTEND)
      uses: aquasecurity/trivy-action@0.20.0
      with:
        image-ref: appacr1603.azurecr.io/frontend:${{ github.sha }}
        format: json
        output: frontend-trivy-report.json
        exit-code: 0
    - name: Upload Frontend Scan Report
      uses: actions/upload-artifact@v4
      with:
        name: frontend-trivy-report
        path: frontend-trivy-report.json

    - name: Push Frontend Image
      run: |
        docker push appacr1603.azurecr.io/frontend:${{ github.sha }}

    - name: Get AKS Credentials
      run: |
        az aks get-credentials \
          --resource-group appRG-1603 \
          --name appAKS1603 \
          --overwrite-existing

    - name: Apply Kubernetes manifests
      run: kubectl apply -f k8s/

    - name: Deploy latest images
      run: |
        kubectl set image deployment/backend-deployment backend=appacr1603.azurecr.io/backend:${{ github.sha }}
        kubectl set image deployment/frontend-deployment frontend=appacr1603.azurecr.io/frontend:${{ github.sha }}

  blue-green-deployment:
    needs: build-and-deploy
    runs-on: ubuntu-latest

    steps:
    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Get AKS Credentials
      run: |
        az aks get-credentials \
          --resource-group appRG-1603 \
          --name appAKS1603 \
          --overwrite-existing

    - name: Blue-Green Backend
      run: |
        CURRENT_COLOR=$(kubectl get service backend-service -o jsonpath='{.spec.selector.color}' 2>/dev/null || echo blue)
        NEW_COLOR=$([ "$CURRENT_COLOR" = blue ] && echo green || echo blue)

        kubectl set image deployment/backend-deployment-$NEW_COLOR \
        backend=appacr1603.azurecr.io/backend:${{ github.sha }}

        kubectl rollout status deployment/backend-deployment-$NEW_COLOR --timeout=300s

        kubectl patch service backend-service \
        -p "{\"spec\":{\"selector\":{\"app\":\"backend\",\"color\":\"$NEW_COLOR\"}}}"

        OLD_COLOR=$([ "$NEW_COLOR" = blue ] && echo green || echo blue)
        kubectl scale deployment backend-deployment-$OLD_COLOR --replicas=0 || true

    - name: Blue-Green Frontend
      run: |
        CURRENT_COLOR=$(kubectl get service frontend-service -o jsonpath='{.spec.selector.color}' 2>/dev/null || echo blue)
        NEW_COLOR=$([ "$CURRENT_COLOR" = blue ] && echo green || echo blue)

        kubectl set image deployment/frontend-deployment-$NEW_COLOR \
        frontend=appacr1603.azurecr.io/frontend:${{ github.sha }}

        kubectl rollout status deployment/frontend-deployment-$NEW_COLOR --timeout=300s

        kubectl patch service frontend-service \
        -p "{\"spec\":{\"selector\":{\"app\":\"frontend\",\"color\":\"$NEW_COLOR\"}}}"

        OLD_COLOR=$([ "$NEW_COLOR" = blue ] && echo green || echo blue)
        kubectl scale deployment frontend-deployment-$OLD_COLOR --replicas=0 || true