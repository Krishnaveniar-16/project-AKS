name: CI-CD Pipeline for AKS Deployment

on:
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}


    - name: Login to ACR
      run: az acr login --name appacr1603


    - name: Build Backend Image
      run: |
        docker build -t appacr1603.azurecr.io/backend:${{ github.sha }} ./backend

    - name: Push Backend Image
      run: |
        docker push appacr1603.azurecr.io/backend:${{ github.sha }}


    - name: Build Frontend Image
      run: |
        docker build -t appacr1603.azurecr.io/frontend:${{ github.sha }} ./frontend

    - name: Push Frontend Image
      run: |
        docker push appacr1603.azurecr.io/frontend:${{ github.sha }}

    - name: Get AKS Credentials
      run: |
        az aks get-credentials \
          --resource-group appRG-1603 \
          --name appAKS1603 \
          --overwrite-existing


    - name: Apply Kubernetes manifests
      run: kubectl apply -f k8s/

 
    - name: Deploy latest images
      run: |
        kubectl set image deployment/backend-deployment backend=$ACR_LOGIN_SERVER/backend:${{ github.sha }}
        kubectl set image deployment/frontend-deployment frontend=$ACR_LOGIN_SERVER/frontend:${{ github.sha }}

    - name: Verify deployment
      run: |
        kubectl rollout status deployment/backend-deployment
        kubectl rollout status deployment/frontend-deployment
        